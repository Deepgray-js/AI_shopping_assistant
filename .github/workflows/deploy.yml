name: Deploy to Aliyun ECS (Direct)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to ECS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Aliyun ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 114.55.98.126
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_PRIVATE_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          script: |
            # 进入项目目录（如果不存在则创建）
            cd ~/AI_shopping_assistant || git clone https://github.com/Deepgray-js/AI_shopping_assistant.git ~/AI_shopping_assistant
            cd ~/AI_shopping_assistant
            
            # 拉取最新代码
            git checkout main
            git pull origin main
            
            # 检查 Node.js 是否安装
            if ! command -v node &> /dev/null; then
              echo "Node.js is not installed. Please install Node.js 20.x on your ECS first."
              exit 1
            fi
            
            # 检查 npm 是否可用
            if ! command -v npm &> /dev/null; then
              echo "npm is not available."
              exit 1
            fi
            
            # 安装依赖
            echo "Installing dependencies..."
            npm ci
            
            # 构建项目
            echo "Building project..."
            npm run build
            
            # 停止旧进程（如果正在运行）
            echo "Stopping old process..."
            pkill -f "npm start" || true
            pkill -f "node" || true
            
            # 启动服务（后台运行）
            echo "Starting service..."
            export DASHSCOPE_API_KEY="${{ secrets.DASHSCOPE_API_KEY }}"
            export NODE_ENV=production
            nohup npm start > ~/AI_shopping_assistant/app.log 2>&1 &
            
            # 等待启动
            sleep 10
            
            # 检查进程是否运行
            if pgrep -f "node"; then
              echo "✅ Deployment successful! Service is running."
            else
              echo "❌ Deployment failed. Service is not running."
              tail -50 ~/AI_shopping_assistant/app.log
              exit 1
            fi
