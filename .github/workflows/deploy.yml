name: Deploy to Aliyun ECS (Git Pull)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy via SSH

    steps:
      - name: Execute deployment commands on ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 114.55.98.126
          username: root
          key: ${{ secrets.ECS_PRIVATE_KEY }}
          script: |
            cd ~/AI_shopping_assistant
            git pull origin main
