name: Deploy to Aliyun ECS (Code Sync Only)

on:
  push:
    branches: [main]

jobs:
  sync-code:
    runs-on: ubuntu-latest
    name: Sync Code to ECS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Code to Aliyun ECS via SSH
        uses: easingthemes/ssh-deploy@v4
        with:
          REMOTE_HOST: 114.55.98.126
          REMOTE_USER: root
          SOURCE: "./"
          TARGET: "~/AI_shopping_assistant"
          ARGS: "-rlgoDzvc --delete --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='.env' --exclude='.github' --exclude='.env.local' --exclude='.env.development.local' --exclude='.env.test.local' --exclude='.env.production.local'"
